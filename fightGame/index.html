<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>title</title>
    <link href="./style.css" rel="stylesheet">    
</head>
<body>

<!-- The container where dice will roll -->
<div id="dicebox" style="height: 100%; width: 100%;"></div>



<div id="topSpace">
    <h1>Enemies Slain:</h1>
    <h1 id="slainEnemies">5</h1>
</div>

<div id="cardHolder">
    <div class="statCard">
        <h1>Player</h1>
        <h2><u>Health</u></h2>
        <h2>50%</h2>
        <h2><u>Damage</u></h2>
        <h2>5-10</h2>
    </div>
    <div class="statCard">    <h1>Enemy</h1>
        <h2><u>Health</u></h2>
        <h2>50%</h2>
        <h2><u>Damage</u></h2>
        <h2>5-10</h2>
    </div>
    <button class="actionButton" id="healbutton">Heal</button>
    <button class="actionButton" id="attackButton">Attack</button>
</div>

<div id="bottomSpace">
    <button id="diceButton">Roll Dice</button>
</div>

<script src="https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/dice-box.es.min.js"></script>
<script type="module" src="./code.js"></script>

</body>
</html>
